name: Validate Profile README

on:
  push:
    branches: [main]
    paths:
      - '.bin/**'
      - 'README.md'
  pull_request:
    paths:
      - '.bin/**'
      - 'README.md'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        working-directory: .bin
        run: poetry install --no-interaction

      - name: Validate generator runs without errors
        working-directory: .bin
        run: poetry run python generate.py --dry-run > /dev/null

      - name: Check markdown structure
        run: |
          # Verify README has expected sections
          grep -q "## Featured Projects" README.md || { echo "Missing Featured Projects section"; exit 1; }
          grep -q "<details>" README.md || { echo "Missing catalog section"; exit 1; }
          grep -q "capsule-render" README.md || { echo "Missing header/footer"; exit 1; }
          echo "README structure validated"
