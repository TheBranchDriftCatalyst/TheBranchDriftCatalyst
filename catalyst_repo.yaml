# Catalyst Repository Metadata
# This file defines metadata for each repository to be used by the profile page generator

version: "0.1.1"

# Repository Information
name: "TheBranchDriftCatalyst"
description: "GitHub profile page generator with synthwave styling and AI-powered project summaries"
repo_url: "https://github.com/TheBranchDriftCatalyst/TheBranchDriftCatalyst"

# Visibility
private: false

# Repository Status (active, archived, wip, experimental)
status: "active"

# Tech Stack
tech_stack:
  languages:
    - "python"
    - "markdown"
  frameworks:
    - "pydantic"
  tools:
    - "pyyaml"
    - "shields.io"
    - "poetry"

# Grouping/Categories (for organizing on profile page)
groups:
  - "meta"
  - "generators"
  - "tools"

# Badge Configuration
badges:
  stars: true
  issues: true
  prs: true
  license: true

# Custom highlights
highlights:
  - "Auto-discovers repositories by scanning workspace directories for catalyst_repo.yaml metadata files"
  - "Pydantic-validated data models (RepoMetadata, TechStack, Config) ensure schema correctness across all repo configs"
  - "Scans package.json and pyproject.toml to auto-detect tech stacks and generate shields.io badges from 80+ known technologies"
  - "Synthwave-themed output with catalyst-ui design system palette, capsule-render wave headers, skillicons.dev aggregation, and typing SVG taglines"
